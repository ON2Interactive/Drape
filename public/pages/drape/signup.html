<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drape Sign Up</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
        color: #fff;
      }

      .signup-page {
        display: flex;
        min-height: 100vh;
        width: 100%;
        overflow: hidden;
        background: #000;
      }

      .signup-visual {
        position: relative;
        display: none;
        width: 50%;
        min-height: 100vh;
        overflow: hidden;
      }

      .signup-visual img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .signup-visual::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(0, 0, 0, 0.18) 0%, rgba(0, 0, 0, 0) 45%, rgba(0, 0, 0, 0.85) 100%);
      }

      .signup-panel {
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: center;
        padding: 40px 32px;
        background: #000;
      }

      .signup-card {
        width: 100%;
        max-width: 340px;
      }

      .signup-logo {
        display: inline-flex;
        margin-bottom: 32px;
        transition: opacity 0.2s ease;
      }

      .signup-logo:hover {
        opacity: 0.8;
      }

      .signup-logo img {
        width: 72px;
        height: auto;
        display: block;
      }

      .signup-title {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.15;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .signup-copy {
        margin: 0 0 32px;
        font-size: 14px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.45);
      }

      .signup-button {
        display: inline-flex;
        width: 100%;
        align-items: center;
        justify-content: center;
        gap: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        padding: 14px 18px;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      }

      .signup-button:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .signup-button:active {
        transform: scale(0.985);
      }

      .signup-legal {
        margin: 24px 0 0;
        font-size: 12px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.28);
      }

      .signup-legal a {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: underline;
      }

      @media (min-width: 1024px) {
        .signup-visual {
          display: block;
        }

        .signup-panel {
          width: 50%;
        }
      }
    </style>
  </head>
  <body>
    <div class="signup-page">
      <div class="signup-visual" aria-hidden="true">
        <img src="/Assets/Hero-BG.png" alt="Drape studio" />
      </div>
      <main class="signup-panel">
        <div class="signup-card">
          <a class="signup-logo" href="/">
            <img src="/drape-logo.svg" alt="Drape" />
          </a>

          <h1 class="signup-title">Get started</h1>
          <p class="signup-copy">Sign up or sign in with your Google account.</p>

          <a class="signup-button" href="#" id="google-signin">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </a>

          <p class="signup-legal">
            By continuing, you agree to the <a href="/pages/drape/terms.html">Terms of Service</a>
            and <a href="/pages/drape/privacy.html">Privacy Policy</a>.
          </p>
        </div>
      </main>
    </div>
    <script>
      (function () {
        const btn = document.getElementById("google-signin");
        if (!btn) return;

        btn.addEventListener("click", function (e) {
          e.preventDefault();
          const supabaseAuthUrl = (window.__DRAPE_SUPABASE_AUTH_URL__ || "https://auth.drape.cloud").replace(/\/$/, "");
          const next = "/?workspace=1";
          const redirectTo = `${window.location.origin}/auth/callback?next=${encodeURIComponent(next)}`;
          const authUrl = `${supabaseAuthUrl}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectTo)}`;
          window.location.assign(authUrl);
        });
      })();
    </script>
  </body>
</html>
